<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sentra</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="header">
    <span class="logo">
      <img src="../icons/icon32.png" alt="Sentra" class="logo-icon" />
      <span>Sentra</span>
    </span>
    <div style="display:flex;align-items:center;gap:6px;">
      <button id="btnLangToggle" class="btn-icon" title="Switch language" style="font-size:11px;padding:2px 6px;">EN</button>
      <span class="status-dot" id="statusDot" title="Connection status"></span>
    </div>
  </div>

  <!-- Not logged in -->
  <div id="viewLogin" class="view hidden">
    <p class="hint" id="loginHint"></p>
    <button id="btnOpenDashboard" class="btn btn-primary"></button>
  </div>

  <!-- Logged in -->
  <div id="viewMain" class="view hidden">
    <div class="info-row">
      <span class="label" id="labelLoggedInAs"></span>
      <span class="value" id="userEmail">—</span>
    </div>
    <div class="info-row">
      <span class="label" id="labelInstance"></span>
      <span class="value monospace" id="instanceToken">—</span>
    </div>
    <div class="divider"></div>
    <p class="hint" id="scanHint"></p>
    <div id="scan-history-section" class="section">
      <div class="section-header">
        <span class="section-title" id="labelRecentScans"></span>
        <button id="btnRefreshHistory" class="btn-icon" title="Refresh">&#x21BB;</button>
      </div>
      <ul id="scan-history-list" class="scan-history-list"></ul>
      <div id="scan-history-empty" class="empty-state" style="display:none"></div>
      <a href="#" id="view-all-link" class="view-all-link"></a>
    </div>
    <button id="btnLogout" class="btn btn-secondary"></button>
    <button id="btnOpenDashboard2" class="btn btn-primary"></button>
  </div>

  <script src="../utils/i18n.js"></script>
  <script src="popup.js"></script>
</body>
</html>
